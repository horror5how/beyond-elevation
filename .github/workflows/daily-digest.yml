name: Daily AI & GitHub Digest Email

# Runs at 7 AM UTC daily.
# BST (Mar–Oct): 8 AM BST ✓
# GMT (Oct–Mar): 7 AM GMT  (one hour early in winter — acceptable for a morning digest)

on:
  schedule:
    - cron: '0 7 * * *'   # 7 AM UTC = 8 AM BST (summer) / 7 AM GMT (winter)
  workflow_dispatch:   # Enable manual run from GitHub Actions UI for testing

jobs:
  send-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install nodemailer
        run: npm install nodemailer

      - name: Send daily digest
        env:
          # GitHub token (auto-provided) — used for higher GitHub API rate limits
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # SMTP settings — add these as repository secrets in:
          # GitHub → Settings → Secrets and variables → Actions
          SMTP_HOST:   ${{ secrets.SMTP_HOST }}    # e.g. smtp.gmail.com
          SMTP_PORT:   ${{ secrets.SMTP_PORT }}    # e.g. 587 (TLS) or 465 (SSL)
          SMTP_SECURE: ${{ secrets.SMTP_SECURE }}  # 'true' for port 465, 'false' for 587
          SMTP_USER:   ${{ secrets.SMTP_USER }}    # sender email address
          SMTP_PASS:   ${{ secrets.SMTP_PASS }}    # email password or app password
          SMTP_FROM:   ${{ secrets.SMTP_FROM }}    # optional display address (defaults to SMTP_USER)

          # Optional: Apify token for TikTok trending skills scraping
          # Get a free token at apify.com — add as APIFY_TOKEN secret to enable TikTok section
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}

          # Recipient — hardcoded but can be overridden via secret
          EMAIL_TO: hayat@beyondelevation.com

        run: node scripts/daily-digest.js
