name: Daily AI & GitHub Digest Email

# Two cron entries so the email arrives at 8 AM UK time year-round:
#   0 8 * * *  →  8 AM UTC = 8 AM GMT  (late Oct – late Mar)
#   0 7 * * *  →  7 AM UTC = 8 AM BST  (late Mar – late Oct)
# During the two clock-change weekends both jobs fire; the second is a harmless
# duplicate.  Disable one if that bothers you.

on:
  schedule:
    - cron: '0 8 * * *'   # 8 AM GMT (winter)
    - cron: '0 7 * * *'   # 8 AM BST (summer)
  workflow_dispatch:       # Manual run from the GitHub Actions UI for testing

jobs:
  send-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Send daily digest
        env:
          # Auto-provided — used for higher GitHub API rate limits
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # Resend API key — add this ONE secret in:
          # GitHub → Settings → Secrets and variables → Actions → New repository secret
          # Name: RESEND_API_KEY
          # Sign up free at resend.com (100 emails/day, no credit card needed)
          # Then verify beyondelevation.com as a sending domain.
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}

          # Sending address (must be from your verified Resend domain)
          EMAIL_FROM: digest@beyondelevation.com

          # Recipient
          EMAIL_TO: hayat@beyondelevation.com

        run: node scripts/daily-digest.js
