name: Daily Blog Draft Review Digest

on:
  schedule:
    - cron: '0 13 * * *'   # 09:00 ET / 14:00 BST — after the strategist runs
  workflow_dispatch:

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install nodemailer
        run: npm install --no-save --silent nodemailer@^6

      - name: Send daily draft digest
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          BE_REVIEW_DIGEST_TO: hayat@beyondelevation.com
        run: node scripts/daily-review-digest.mjs
