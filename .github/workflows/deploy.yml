name: Deploy to Vercel Production
on:
  push:
    branches: [main]
    paths-ignore:
      - '.indexing-cache.json'   # cache-only commits must not retrigger a deploy (loop guard)
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Regenerate static blog pages from posts.json
        run: |
          node scripts/build-static-posts.js
          node scripts/build-sitemap.js
          node scripts/generate-blog-markdown.js

      - name: Commit regenerated files if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add blog/posts blog/index.html sitemap.xml llms.txt llms-full.txt blog/md 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
          else
            git commit -m "chore(publish): regenerate static pages from posts.json"
            git push origin main
          fi

      - name: Install Vercel CLI
        run: npm install -g vercel
      - name: Pull Vercel Environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      - name: Deploy to Vercel Production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Restore Google indexing key
        run: printf '%s' "$GCP_INDEXING_KEY" > .gcp-indexing-key.json
        env:
          GCP_INDEXING_KEY: ${{ secrets.GCP_INDEXING_KEY }}

      - name: Install indexing dependency
        run: npm install --no-save --silent googleapis@^144

      - name: Notify Google Indexing API + IndexNow
        run: node scripts/notify-indexing.js
        continue-on-error: true

      - name: Commit indexing cache
        run: |
          rm -f .gcp-indexing-key.json
          git add .indexing-cache.json 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "chore(indexing): update indexing cache after deploy [skip ci]" || true
            git push origin main || true
          fi
