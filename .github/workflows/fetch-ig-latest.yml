name: fetch-ig-latest
on:
  workflow_dispatch:
jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Fetch latest IG media
        env:
          IG_TOKEN: ${{ secrets.ACTIVE_IG_TOKEN }}
          IG_ID: ${{ secrets.ACTIVE_IG_BUSINESS_ID }}
        run: |
          python3 - <<'PYEOF'
          import json, os, urllib.request, urllib.error
          token = os.environ['IG_TOKEN']
          ig_id = os.environ['IG_ID']
          url = f"https://graph.facebook.com/v23.0/{ig_id}/media?fields=id,media_type,timestamp,permalink&limit=5&access_token={token}"
          try:
              with urllib.request.urlopen(url, timeout=30) as r:
                  data = json.loads(r.read())
                  print(json.dumps(data, indent=2))
                  with open('ig-latest-media.json', 'w') as f:
                      json.dump(data, f, indent=2)
          except urllib.error.HTTPError as e:
              err = e.read().decode()
              print(f"Error: {err}")
              with open('ig-latest-media.json', 'w') as f:
                  f.write(err)
          PYEOF
      - name: Commit result
        run: |
          git config user.name "Hayat Amin"
          git config user.email "hayat@beyondelevation.com"
          git add ig-latest-media.json
          git pull --rebase --autostash
          git diff --cached --quiet || git commit -m "chore: update ig-latest-media.json"
          git push
