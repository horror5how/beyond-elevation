name: fetch-ig-latest
on:
  workflow_dispatch:
jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Fetch latest IG media and write via API
        env:
          IG_TOKEN: ${{ secrets.ACTIVE_IG_TOKEN }}
          IG_ID: ${{ secrets.ACTIVE_IG_BUSINESS_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 - <<'PYEOF'
          import json, os, base64, urllib.request, urllib.error
          token = os.environ['IG_TOKEN']
          ig_id = os.environ['IG_ID']
          gh_token = os.environ['GH_TOKEN']
          url = f"https://graph.facebook.com/v23.0/{ig_id}/media?fields=id,media_type,timestamp,permalink&limit=5&access_token={token}"
          try:
              with urllib.request.urlopen(url, timeout=30) as r:
                  data = json.loads(r.read())
                  print(json.dumps(data, indent=2))
                  content = json.dumps(data, indent=2)
          except urllib.error.HTTPError as e:
              err = e.read().decode()
              print(f"Error: {err}")
              content = err
          # Write via GitHub API (avoids git conflicts)
          # First get existing file SHA if it exists
          get_req = urllib.request.Request(
              'https://api.github.com/repos/horror5how/beyond-elevation/contents/ig-latest-media.json',
              headers={'Authorization': f'Bearer {gh_token}', 'Accept': 'application/vnd.github+json'}
          )
          try:
              with urllib.request.urlopen(get_req, timeout=15) as r:
                  existing = json.loads(r.read())
                  sha = existing.get('sha', '')
          except Exception:
              sha = ''
          payload = {'message': 'chore: update ig-latest-media.json', 'content': base64.b64encode(content.encode()).decode()}
          if sha:
              payload['sha'] = sha
          put_req = urllib.request.Request(
              'https://api.github.com/repos/horror5how/beyond-elevation/contents/ig-latest-media.json',
              data=json.dumps(payload).encode(),
              method='PUT',
              headers={'Authorization': f'Bearer {gh_token}', 'Accept': 'application/vnd.github+json', 'Content-Type': 'application/json'}
          )
          with urllib.request.urlopen(put_req, timeout=30) as r:
              result = json.loads(r.read())
              print(f"Written: {result.get('content',{}).get('html_url','')}")
          PYEOF
