name: ig-fetch-relay
on:
  repository_dispatch:
    types: [fetch-ig-media]
jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Fetch latest IG media and commit
        env:
          IG_TOKEN: ${{ secrets.ACTIVE_IG_TOKEN }}
          IG_ID: ${{ secrets.ACTIVE_IG_BUSINESS_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 - <<'PYEOF'
          import json, os, base64, urllib.request, urllib.error, sys
          token = os.environ.get('IG_TOKEN', '').strip()
          ig_id = os.environ.get('IG_ID', '').strip()
          gh_token = os.environ.get('GH_TOKEN', '').strip()
          if not token or not ig_id:
              print('ERROR: missing IG_TOKEN or IG_ID')
              sys.exit(1)
          url = f'https://graph.facebook.com/v23.0/{ig_id}/media?fields=id,media_type,timestamp,permalink&limit=5&access_token={token}'
          with urllib.request.urlopen(url, timeout=30) as r:
              data = json.loads(r.read())
          print(json.dumps(data, indent=2))
          content = json.dumps(data, indent=2)
          # Write via GitHub Contents API
          get_req = urllib.request.Request(
              'https://api.github.com/repos/horror5how/beyond-elevation/contents/ig-latest-media.json',
              headers={'Authorization': f'Bearer {gh_token}', 'Accept': 'application/vnd.github+json'}
          )
          sha = ''
          try:
              with urllib.request.urlopen(get_req, timeout=15) as r:
                  sha = json.loads(r.read()).get('sha', '')
          except Exception:
              pass
          payload = {'message': 'chore: update ig-latest-media', 'content': base64.b64encode(content.encode()).decode()}
          if sha:
              payload['sha'] = sha
          put_req = urllib.request.Request(
              'https://api.github.com/repos/horror5how/beyond-elevation/contents/ig-latest-media.json',
              data=json.dumps(payload).encode(), method='PUT',
              headers={'Authorization': f'Bearer {gh_token}', 'Accept': 'application/vnd.github+json', 'Content-Type': 'application/json'}
          )
          with urllib.request.urlopen(put_req, timeout=30) as r:
              print('Written OK')
          PYEOF
