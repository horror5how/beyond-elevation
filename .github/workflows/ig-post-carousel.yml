name: ig-post-carousel

on:
  workflow_dispatch:
    inputs:
      slide_base_url:
        description: 'Base URL for slides (no trailing slash)'
        required: true
        default: 'https://beyondelevation.com/assets/ig-cloud/human-edge-selection-20260606'
      num_slides:
        description: 'Number of slides'
        required: true
        default: '5'

permissions:
  contents: write

concurrency:
  group: ig-post-carousel
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      IG_TOKEN: ${{ secrets.IG_POSTING_TOKEN }}
      IG_ID: ${{ secrets.IG_BUSINESS_ID }}

    steps:
      - uses: actions/checkout@v4

      - name: Post carousel to Instagram
        run: |
          python3 - <<'PYEOF'
          import json, os, sys, time, urllib.request, urllib.parse, urllib.error

          ig_id    = os.environ.get("IG_ID", "").strip()
          ig_token = os.environ.get("IG_TOKEN", "").strip()
          if not ig_id or not ig_token:
              print("ERROR: missing IG credentials")
              sys.exit(1)

          base_url   = os.environ.get("INPUT_SLIDE_BASE_URL", "").strip()
          num_slides = int(os.environ.get("INPUT_NUM_SLIDES", "5"))
          slide_urls = [f"{base_url}/slide_{i}.jpg" for i in range(1, num_slides + 1)]

          # Read caption from the local repo if it exists at the matching path
          # (strip the domain to get the repo path)
          import re
          rel = re.sub(r'^https://beyondelevation\.com/', '', base_url)
          caption_path = rel + "/caption.txt" if rel else None
          if caption_path and os.path.exists(caption_path):
              caption = open(caption_path).read().strip()
          else:
              caption = "AI writes the 100. You pick the one.\n\nThat's not a small distinction. It's the entire game.\n\nGeneration is now free. Everyone has access to infinite first drafts — from Claude, from Midjourney, from whatever ships next month. The bottleneck shifted overnight.\n\nWhat's scarce: the human who reads 100 outputs, feels the wrongness in 99 of them, and says — with conviction — that one. And can explain exactly why.\n\nThat's taste. That's judgment. That's lived experience compressed into a single decision. No model trained on averages can replicate it.\n\nYou don't need to generate faster. You need to select better. Save this when you're ready to build that edge."

          print(f"[ig] Posting {num_slides} slides from {base_url}")
          print(f"[ig] Caption: {caption[:80]}...")

          BASE = f"https://graph.facebook.com/v23.0/{ig_id}"

          def api_post(url, params):
              data = urllib.parse.urlencode(params).encode()
              req = urllib.request.Request(url, data=data, method="POST")
              try:
                  return json.loads(urllib.request.urlopen(req, timeout=60).read())
              except urllib.error.HTTPError as e:
                  return {"error": e.read().decode()[:500]}
              except Exception as e:
                  return {"error": str(e)[:300]}

          def api_get(url):
              try:
                  return json.loads(urllib.request.urlopen(url, timeout=30).read())
              except urllib.error.HTTPError as e:
                  return {"error": e.read().decode()[:500]}
              except Exception as e:
                  return {"error": str(e)[:300]}

          # 1. Create child containers
          print(f"[ig] Creating {num_slides} child containers...")
          child_ids = []
          for i, url in enumerate(slide_urls):
              r = api_post(f"{BASE}/media", {
                  "image_url": url,
                  "is_carousel_item": "true",
                  "is_aigc": "true",
                  "alt_text": f"Slide {i+1}: AI writes the 100. You pick the one.",
                  "access_token": ig_token,
              })
              print(f"  slide {i+1} ({url}): {r}")
              if "id" not in r:
                  print(f"ERROR: child container failed: {r}")
                  sys.exit(1)
              child_ids.append(r["id"])

          # 2. Carousel parent
          parent = api_post(f"{BASE}/media", {
              "media_type": "CAROUSEL",
              "children": ",".join(child_ids),
              "caption": caption,
              "is_aigc": "true",
              "access_token": ig_token,
          })
          print(f"[ig] Carousel container: {parent}")
          if "id" not in parent:
              print(f"ERROR: carousel failed: {parent}")
              sys.exit(1)
          creation_id = parent["id"]

          # 3. Wait for processing
          for attempt in range(20):
              status = api_get(f"{BASE}/{creation_id}?fields=status_code&access_token={ig_token}")
              sc = status.get("status_code", "")
              print(f"  poll {attempt+1}: {sc}")
              if sc == "FINISHED":
                  break
              if sc == "ERROR":
                  print(f"ERROR: processing failed: {status}")
                  sys.exit(1)
              time.sleep(3)

          # 4. Publish
          pub = api_post(f"{BASE}/media_publish", {
              "creation_id": creation_id,
              "access_token": ig_token,
          })
          print(f"[ig] Publish: {pub}")
          if "id" not in pub:
              print(f"ERROR: publish failed: {pub}")
              sys.exit(1)

          media_id = pub["id"]
          perma = api_get(f"https://graph.facebook.com/v23.0/{media_id}?fields=permalink&access_token={ig_token}")
          permalink = perma.get("permalink", "")
          print(f"\nSUCCESS media_id={media_id}")
          print(f"SUCCESS permalink={permalink}")
          print(f"SUCCESS slides={json.dumps(slide_urls)}")
          PYEOF
        env:
          INPUT_SLIDE_BASE_URL: ${{ github.event.inputs.slide_base_url }}
          INPUT_NUM_SLIDES: ${{ github.event.inputs.num_slides }}
