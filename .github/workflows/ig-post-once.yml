name: ig-post-once

on:
  workflow_dispatch:
    inputs:
      slide_urls:
        description: 'Newline-separated public slide URLs'
        required: true
      caption:
        description: 'Instagram caption'
        required: true
      graph_version:
        description: 'Graph API version'
        required: false
        default: 'v23.0'

permissions:
  contents: read

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      ACTIVE_IG_TOKEN: ${{ secrets.ACTIVE_IG_TOKEN }}
      ACTIVE_IG_BUSINESS_ID: ${{ secrets.ACTIVE_IG_BUSINESS_ID }}
    steps:
      - name: Post carousel to Instagram
        run: |
          python3 - <<'PYEOF'
          import json, os, sys, time, urllib.request, urllib.parse, urllib.error

          ig_id    = os.environ['ACTIVE_IG_BUSINESS_ID'].strip()
          ig_token = os.environ['ACTIVE_IG_TOKEN'].strip()
          version  = '${{ github.event.inputs.graph_version }}'
          base     = f'https://graph.facebook.com/{version}/{ig_id}'

          raw_urls = '''${{ github.event.inputs.slide_urls }}'''
          slide_urls = [u.strip() for u in raw_urls.strip().splitlines() if u.strip()]
          caption = '''${{ github.event.inputs.caption }}'''

          print(f'[ig-post] posting {len(slide_urls)} slides to IG {ig_id}')
          for i, u in enumerate(slide_urls):
              print(f'  slide {i+1}: {u}')

          def gh_post(url, params):
              data = urllib.parse.urlencode(params).encode()
              req = urllib.request.Request(url, data=data, method='POST')
              try:
                  return json.loads(urllib.request.urlopen(req, timeout=60).read())
              except urllib.error.HTTPError as e:
                  return {'error': e.read().decode()[:500]}
              except Exception as e:
                  return {'error': str(e)[:300]}

          def gh_get(url):
              try:
                  return json.loads(urllib.request.urlopen(url, timeout=30).read())
              except urllib.error.HTTPError as e:
                  return {'error': e.read().decode()[:500]}
              except Exception as e:
                  return {'error': str(e)[:300]}

          child_ids = []
          for i, url in enumerate(slide_urls):
              r = gh_post(f'{base}/media', {
                  'image_url': url,
                  'is_carousel_item': 'true',
                  'is_aigc': 'true',
                  'alt_text': f'Slide {i+1}: The Fractional Future',
                  'access_token': ig_token,
              })
              print(f'  child {i+1}: {r}')
              if 'id' not in r:
                  print(f'[ig-post] FAIL child {i+1}: {r}')
                  sys.exit(1)
              child_ids.append(r['id'])

          parent = gh_post(f'{base}/media', {
              'media_type': 'CAROUSEL',
              'children': ','.join(child_ids),
              'caption': caption,
              'is_aigc': 'true',
              'access_token': ig_token,
          })
          print(f'[ig-post] carousel container: {parent}')
          if 'id' not in parent:
              print(f'[ig-post] FAIL parent: {parent}')
              sys.exit(1)
          creation_id = parent['id']

          for _ in range(20):
              status = gh_get(f'{base}/{creation_id}?fields=status_code&access_token={ig_token}')
              sc = status.get('status_code', '')
              print(f'  poll: {sc}')
              if sc == 'FINISHED': break
              if sc == 'ERROR':
                  print(f'[ig-post] FAIL processing: {status}')
                  sys.exit(1)
              time.sleep(3)

          publish = gh_post(f'{base}/media_publish', {
              'creation_id': creation_id,
              'access_token': ig_token,
          })
          print(f'[ig-post] publish: {publish}')
          if 'id' not in publish:
              print(f'[ig-post] FAIL publish: {publish}')
              sys.exit(1)
          media_id = publish['id']

          perma = gh_get(f'https://graph.facebook.com/{version}/{media_id}?fields=permalink&access_token={ig_token}')
          print(f'[ig-post] SUCCESS media_id={media_id} permalink={perma.get("permalink","")}')
          PYEOF
