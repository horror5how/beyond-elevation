name: Post Instagram Carousel (One-Shot)

on:
  workflow_dispatch:
    inputs:
      slug:
        description: 'Asset slug under assets/ig-cloud/'
        required: true
        default: 'human-edge-intuition-20260604'
      hook:
        description: 'Post hook/theme label'
        required: false
        default: 'Your intuition is a dataset AI lacks'

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Write post script
        run: |
          cat > /tmp/post_ig.py << 'EOF'
          import json, os, time, urllib.request, urllib.parse, sys
          IG_ID   = os.environ["INSTAGRAM_BUSINESS_ID"]
          TOKEN   = os.environ["INSTAGRAM_ACCESS_TOKEN"]
          SLUG    = os.environ["ASSET_SLUG"]
          HOOK    = os.environ["HOOK"]
          VERSION = "v23.0"
          BASE    = f"https://graph.facebook.com/{VERSION}"
          CDN     = f"https://beyondelevation.com/assets/ig-cloud/{SLUG}"
          SLIDES  = [f"{CDN}/slide_{i}.jpg" for i in range(1, 6)]
          CAPTION = (
              "Your intuition is a dataset AI lacks.\n\n"
              "Every 'learn to prompt' tutorial tells you to adapt to the machine. "
              "Nobody tells you the machine cannot adapt to you.\n\n"
              "Your gut isn't a feeling. It's 10,000 real decisions - bad bosses survived, "
              "pivots called early, rooms read in seconds - compressed into instant judgment. "
              "That data doesn't exist in any training corpus on earth.\n\n"
              "The fractional operators commanding premium rates aren't selling hours. "
              "They're selling reads. The moment in a boardroom when everyone else sees "
              "the spreadsheet and they see the trap.\n\n"
              "Log the calls you've gotten right. Name the pattern. That's your offer.\n\n"
              "#FractionalWork #HumanEdge #FutureOfWork"
          )
          def api_post(ep, params):
              data = urllib.parse.urlencode(params).encode()
              req  = urllib.request.Request(f"{BASE}{ep}", data=data, method="POST")
              try:
                  return json.loads(urllib.request.urlopen(req, timeout=60).read())
              except urllib.error.HTTPError as e:
                  return {"error": e.read().decode()[:500]}
              except Exception as e:
                  return {"error": str(e)}
          def api_get(url):
              try:
                  return json.loads(urllib.request.urlopen(url, timeout=30).read())
              except urllib.error.HTTPError as e:
                  return {"error": e.read().decode()[:500]}
              except Exception as e:
                  return {"error": str(e)}
          print(f"Posting: {HOOK}")
          child_ids = []
          for i, url in enumerate(SLIDES, 1):
              print(f"  child {i}: {url}")
              r = api_post(f"/{IG_ID}/media", {"image_url": url, "is_carousel_item": "true",
                  "is_aigc": "true", "alt_text": f"Slide {i}: {HOOK}", "access_token": TOKEN})
              print(f"    -> {r}")
              if "id" not in r:
                  print(f"FAIL child {i}: {r}", file=sys.stderr); sys.exit(1)
              child_ids.append(r["id"])
              time.sleep(1)
          parent = api_post(f"/{IG_ID}/media", {"media_type": "CAROUSEL",
              "children": ",".join(child_ids), "caption": CAPTION,
              "is_aigc": "true", "access_token": TOKEN})
          print(f"  carousel: {parent}")
          if "id" not in parent:
              print(f"FAIL carousel: {parent}", file=sys.stderr); sys.exit(1)
          creation_id = parent["id"]
          for _ in range(20):
              s = api_get(f"{BASE}/{creation_id}?fields=status_code&access_token={TOKEN}")
              sc = s.get("status_code","?"); print(f"  status: {sc}")
              if sc == "FINISHED": break
              if sc == "ERROR": print(f"FAIL status: {s}", file=sys.stderr); sys.exit(1)
              time.sleep(3)
          pub = api_post(f"/{IG_ID}/media_publish", {"creation_id": creation_id, "access_token": TOKEN})
          print(f"  publish: {pub}")
          if "id" not in pub:
              print(f"FAIL publish: {pub}", file=sys.stderr); sys.exit(1)
          media_id = pub["id"]
          print(f"SUCCESS media_id={media_id}")
          with open("/tmp/ig_result.txt", "w") as f:
              f.write(media_id)
          EOF

      - name: Post carousel to Instagram
        env:
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_BUSINESS_ID: ${{ secrets.INSTAGRAM_BUSINESS_ID }}
          ASSET_SLUG: ${{ inputs.slug }}
          HOOK: ${{ inputs.hook }}
        run: python3 /tmp/post_ig.py

      - name: Persist result
        if: success()
        run: |
          MEDIA_ID=$(cat /tmp/ig_result.txt)
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          echo "{\"ts\": \"$TS\", \"slug\": \"${{ inputs.slug }}\", \"theme\": \"human_edge\", \"hook\": \"${{ inputs.hook }}\", \"media_id\": \"$MEDIA_ID\"}" >> ig-post-log.jsonl
          git config user.email "hayat@beyondelevation.com"
          git config user.name "Hayat Amin"
          git add ig-post-log.jsonl
          git commit -m "chore(ig): carousel posted media_id=$MEDIA_ID" || true
          git push || true
