name: Post IG Carousel (one-shot)
on:
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      IG_TOKEN: ${{ secrets.IG_TOKEN_TEMP }}
      IG_ID: "17841422274109557"
    steps:
      - name: Post how_to_fractional carousel
        run: |
          python3 << 'PYEOF'
          import os, json, urllib.request, urllib.parse, urllib.error
          import subprocess, tempfile, sys, time

          IG_TOKEN = os.environ["IG_TOKEN"]
          IG_ID    = os.environ["IG_ID"]

          IMAGE_URLS = [
              "https://horror5how.github.io/ig-assets/slides/1780690780690_e8991f6e.jpg",
              "https://horror5how.github.io/ig-assets/slides/1780690781565_3e2ba768.jpg",
              "https://horror5how.github.io/ig-assets/slides/1780690781566_ada404e2.jpg",
              "https://horror5how.github.io/ig-assets/slides/1780690781567_7ecc65c8.jpg",
              "https://horror5how.github.io/ig-assets/slides/1780690781568_1ba8a71c.jpg",
          ]

          CAPTION = (
              "Stop writing proposals. Send this instead.\n\n"
              "Most people delay going fractional for months because they're building the wrong thing. "
              "A website no one visits. A deck no one reads. A case study library for clients who haven't asked.\n\n"
              "Here's what I've watched actually work: one crisp page that says who you help, what problem you solve, "
              "and what the outcome looks like. One real case study. One calendar link.\n\n"
              "That's the minimum viable fractional kit. Not polished. Not perfect. Done.\n\n"
              "The clients who hired me didn't care about the packaging. "
              "They cared that I understood their problem better than they did.\n\n"
              "Start there. Ship something this week."
          )

          def rehost(url):
              with tempfile.NamedTemporaryFile(suffix='.jpg', delete=False) as f:
                  tmp = f.name
              try:
                  req = urllib.request.Request(url)
                  with urllib.request.urlopen(req, timeout=60) as resp:
                      with open(tmp, 'wb') as f: f.write(resp.read())
                  for name, api, prefix, extra in [
                      ("catbox",    "https://catbox.moe/user/api.php",                           "https://files.catbox.moe/",  []),
                      ("litterbox", "https://litterbox.catbox.moe/resources/internals/api.php", "https://litter.catbox.moe/", ["-F", "time=24h"]),
                  ]:
                      proc = subprocess.run(
                          ["curl", "-s", "--max-time", "60", "-F", "reqtype=fileupload"]
                          + extra + ["-F", f"fileToUpload=@{tmp}", api],
                          capture_output=True, text=True, timeout=90,
                      )
                      cdn = proc.stdout.strip()
                      if cdn.startswith(prefix):
                          print(f"  rehosted via {name}: {cdn}"); return cdn
                      print(f"  {name} response: {cdn[:80]}")
                  print("  all hosts failed, using original")
                  return url
              finally:
                  try: os.unlink(tmp)
                  except: pass

          def api_post(url, params):
              data = urllib.parse.urlencode(params).encode()
              req = urllib.request.Request(url, data=data, method="POST")
              try:
                  with urllib.request.urlopen(req, timeout=60) as resp: return json.loads(resp.read())
              except urllib.error.HTTPError as e: return {"error": e.read().decode()[:500]}

          def api_get(url):
              try:
                  with urllib.request.urlopen(url, timeout=30) as resp: return json.loads(resp.read())
              except urllib.error.HTTPError as e: return {"error": e.read().decode()[:500]}

          print("[1] Rehosting slides to catbox...")
          cdn_urls = []
          for i, url in enumerate(IMAGE_URLS):
              print(f"  slide {i+1}: {url}")
              cdn_urls.append(rehost(url))

          base = f"https://graph.facebook.com/v23.0/{IG_ID}"

          print("[2] Creating child containers...")
          child_ids = []
          for i, url in enumerate(cdn_urls):
              r = api_post(f"{base}/media", {
                  "image_url": url, "is_carousel_item": "true",
                  "is_aigc": "true", "alt_text": f"Slide {i+1}",
                  "access_token": IG_TOKEN,
              })
              if "id" not in r: print(f"  FAIL child {i+1}: {r}"); sys.exit(1)
              child_ids.append(r["id"])
              print(f"  child {i+1}: {r['id']}")

          print("[3] Creating carousel parent...")
          parent = api_post(f"{base}/media", {
              "media_type": "CAROUSEL", "children": ",".join(child_ids),
              "caption": CAPTION, "is_aigc": "true", "access_token": IG_TOKEN,
          })
          if "id" not in parent: print("FAIL carousel:", parent); sys.exit(1)
          creation_id = parent["id"]
          print("  creation_id:", creation_id)

          print("[4] Polling status...")
          for i in range(25):
              time.sleep(3)
              s = api_get(f"{base}/{creation_id}?fields=status_code&access_token={IG_TOKEN}")
              sc = s.get("status_code", "")
              print(f"  poll {i+1}: {sc or '(empty)'}")
              if sc == "FINISHED": break
              if sc == "ERROR": print("ERROR:", s); sys.exit(1)

          print("[5] Publishing...")
          pub = api_post(f"{base}/media_publish", {"creation_id": creation_id, "access_token": IG_TOKEN})
          if "id" not in pub: print("FAIL publish:", pub); sys.exit(1)
          media_id = pub["id"]
          perma = api_get(f"https://graph.facebook.com/v23.0/{media_id}?fields=permalink&access_token={IG_TOKEN}")
          permalink = perma.get("permalink", "")
          print(f"SUCCESS  media_id={media_id}  permalink={permalink}")
          PYEOF
