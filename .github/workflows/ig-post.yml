name: Instagram Post Relay
on:
  workflow_dispatch:
    inputs:
      slide_urls:
        description: 'Comma-separated slide image URLs'
        required: true
        type: string
      caption_b64:
        description: 'Base64-encoded caption'
        required: true
        type: string
      ig_token:
        description: 'Instagram access token'
        required: true
        type: string
      ig_user_id:
        description: 'Instagram user ID'
        required: true
        type: string

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Mask token
        run: echo "::add-mask::${{ inputs.ig_token }}"

      - name: Post carousel to Instagram
        env:
          SLIDE_URLS: ${{ inputs.slide_urls }}
          CAPTION_B64: ${{ inputs.caption_b64 }}
          IG_TOKEN: ${{ inputs.ig_token }}
          IG_USER_ID: ${{ inputs.ig_user_id }}
        run: |
          python3 << 'PYEOF'
          import os, json, time, base64
          import urllib.request, urllib.parse, urllib.error

          token = os.environ['IG_TOKEN']
          user_id = os.environ['IG_USER_ID']
          caption = base64.b64decode(os.environ['CAPTION_B64']).decode('utf-8')
          slide_urls = [u.strip() for u in os.environ['SLIDE_URLS'].split(',') if u.strip()]

          GRAPH_VERSION = "v23.0"

          def graph_post(path, data):
              d = dict(data)
              d['access_token'] = token
              url = "https://graph.facebook.com/" + GRAPH_VERSION + path
              body = urllib.parse.urlencode(d).encode()
              req = urllib.request.Request(url, data=body, method='POST')
              try:
                  with urllib.request.urlopen(req, timeout=30) as r:
                      return json.loads(r.read())
              except urllib.error.HTTPError as e:
                  return json.loads(e.read())

          def graph_get(path, params=None):
              p = dict(params or {})
              p['access_token'] = token
              qs = '&'.join(k + '=' + urllib.parse.quote(str(v), safe=',') for k, v in p.items())
              url = "https://graph.facebook.com/" + GRAPH_VERSION + path + "?" + qs
              req = urllib.request.Request(url, method='GET')
              try:
                  with urllib.request.urlopen(req, timeout=30) as r:
                      return json.loads(r.read())
              except urllib.error.HTTPError as e:
                  return json.loads(e.read())

          print("Posting", len(slide_urls), "slides as carousel to IG user", user_id)

          child_ids = []
          for i, url in enumerate(slide_urls):
              r = graph_post("/" + user_id + "/media", {
                  "image_url": url,
                  "is_carousel_item": "true"
              })
              cid = r.get("id", "")
              err = r.get("error", "")
              print("Child", i + 1, ": id=" + str(cid) + " err=" + str(err))
              if not cid:
                  raise SystemExit("FAILED child " + str(i + 1) + ": " + json.dumps(r))
              child_ids.append(cid)

          children_str = ",".join(child_ids)
          print("All children:", children_str)

          r = graph_post("/" + user_id + "/media", {
              "media_type": "CAROUSEL",
              "children": children_str,
              "caption": caption
          })
          cid = r.get("id", "")
          err = r.get("error", "")
          print("Carousel container: id=" + str(cid) + " err=" + str(err))
          if not cid:
              raise SystemExit("FAILED carousel: " + json.dumps(r))
          carousel_id = cid

          for attempt in range(30):
              time.sleep(5)
              r = graph_get("/" + carousel_id, {"fields": "status_code,status"})
              sc = r.get("status_code", "UNKNOWN")
              print("Poll", attempt + 1, ": status_code=" + sc)
              if sc == "FINISHED":
                  print("Container ready!")
                  break
              elif sc == "ERROR":
                  raise SystemExit("Container error: " + json.dumps(r))

          r = graph_post("/" + user_id + "/media_publish", {"creation_id": carousel_id})
          mid = r.get("id", "")
          err = r.get("error", "")
          print("Publish: id=" + str(mid) + " err=" + str(err))
          if not mid:
              raise SystemExit("FAILED publish: " + json.dumps(r))

          print("")
          print("SUCCESS media_id=" + mid)
          PYEOF
