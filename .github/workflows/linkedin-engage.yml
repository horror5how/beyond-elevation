name: LinkedIn Engagement (UK 3×/day)

on:
  repository_dispatch:
    types: [linkedin-engage]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Don't actually post replies — draft + log only"
        type: boolean
        default: false
  # CLOUD CRON DISABLED 2026-05-28: LinkedIn challenges every Browserbase session
  # (with full cookie jar + residential proxy + UK fingerprint + homepage pre-warm
  # the page redirects to /checkpoint/challenge "Security Verification"). Pivoting
  # to a local launchd runner on Hayat's Mac at 08:00 / 13:00 / 16:00 UK local time,
  # which uses his actual residential IP + fingerprint and is not challenged.
  # Workflow kept for `workflow_dispatch` manual debugging.
  #
  # schedule:
  #   - cron: "0 7 * * *"   # 08:00 BST
  #   - cron: "0 12 * * *"  # 13:00 BST
  #   - cron: "0 15 * * *"  # 16:00 BST

permissions:
  contents: write

jobs:
  engage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install deps
        run: |
          npm install --no-save \
            @anthropic-ai/sdk@^0.39.0 \
            @browserbasehq/sdk@^2.6.0 \
            playwright-core@^1.60.0

      - name: Engage
        env:
          BROWSERBASE_API_KEY: ${{ secrets.BROWSERBASE_API_KEY }}
          BROWSERBASE_PROJECT_ID: ${{ secrets.BROWSERBASE_PROJECT_ID }}
          LI_COOKIES_JSON: ${{ secrets.LI_COOKIES_JSON }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          mkdir -p linkedin-queue
          node scripts/li-engage.mjs || echo "engage exited non-zero (already logged)"

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: li-engage-debug-${{ github.run_id }}
          path: |
            /tmp/li-*.png
            linkedin-engagement-log.md
          if-no-files-found: ignore
          retention-days: 7

      - name: Commit engagement log
        if: always()
        run: |
          git config user.email 'agent@beyondelevation.com'
          git config user.name 'BE LinkedIn Agent'
          git add linkedin-engagement-log.md linkedin-queue/seen-comments.json 2>/dev/null || true
          git diff --cached --quiet && { echo 'no changes'; exit 0; }
          git commit -m 'LinkedIn: engagement log update'
          # 3× daily now (down from every 30 min) so push races are far less likely,
          # but keep the rebase-retry guard from the prior incident.
          for i in 1 2 3 4; do
            git push origin main && exit 0
            sleep $((i * 3))
            git pull --rebase origin main || true
          done
          echo 'push failed after retries'
          exit 1
