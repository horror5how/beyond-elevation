name: LinkedIn First-30-Min Engagement

on:
  repository_dispatch:
    types: [linkedin-engage]
  workflow_dispatch:
  schedule:
    # fallback — runs every 30 min so engagement always happens even if dispatch missed
    - cron: '*/30 * * * *'

permissions:
  contents: write

jobs:
  engage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install deps
        run: |
          npm install @anthropic-ai/sdk@^0.30.0

      - name: Engage
        env:
          LI_TOKEN: ${{ secrets.LI_TOKEN }}
          LI_URN: ${{ secrets.LI_URN }}
          LI_COOKIES_JSON: ${{ secrets.LI_COOKIES_JSON }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          mkdir -p linkedin-queue
          node scripts/li-engage.mjs || echo "engage exited non-zero (already logged)"

      - name: Commit engagement log
        if: always()
        run: |
          git config user.email 'agent@beyondelevation.com'
          git config user.name 'BE LinkedIn Agent'
          git add linkedin-engagement-log.md linkedin-queue/seen-comments.json 2>/dev/null || true
          git diff --cached --quiet && { echo 'no changes'; exit 0; }
          git commit -m 'LinkedIn: engagement log update'
          # 2026-05-01 COO audit: race-condition push fixed with rebase + retry
          # (engage runs every 30 min and races carousel queue / publisher commits).
          for i in 1 2 3 4; do
            git push origin main && exit 0
            sleep $((i * 3))
            git pull --rebase origin main || true
          done
          echo 'push failed after retries'
          exit 1
