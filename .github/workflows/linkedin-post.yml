name: Publish LinkedIn Post

on:
  push:
    branches: [main]
    paths:
      - 'linkedin-queue/next-caption.txt'
      - 'linkedin-queue/next-image.html'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Playwright
        run: |
          npm install playwright@1.56.1
          npx playwright install --with-deps chromium

      - name: Render BEIP image
        run: |
          node -e "
          const { chromium } = require('playwright');
          (async () => {
            const browser = await chromium.launch();
            const page = await browser.newPage();
            await page.setViewportSize({ width: 1080, height: 1080 });
            await page.goto('file://' + process.cwd() + '/linkedin-queue/next-image.html');
            await page.waitForTimeout(500);
            await page.screenshot({ path: '/tmp/be-li-image.png', fullPage: false });
            await browser.close();
            console.log('Image rendered');
          })().catch(e => { console.error(e); process.exit(1); });
          "
          ls -la /tmp/be-li-image.png

      - name: Publish to LinkedIn
        env:
          LI_TOKEN: ${{ secrets.LI_TOKEN }}
          LI_URN: ${{ secrets.LI_URN }}
        run: |
          OUTPUT=$(node scripts/linkedin-publish.mjs \
            --image /tmp/be-li-image.png \
            --text "$(cat linkedin-queue/next-caption.txt)")
          ECODE=$?
          echo "$OUTPUT"
          echo "exit=$ECODE"

          git config user.email 'agent@beyondelevation.com'
          git config user.name 'BE LinkedIn Agent'

          if [ "$ECODE" = "2" ]; then
            stamp=$(date -u '+%Y-%m-%d %H:%M')
            echo "$stamp | FAIL | 401 EMPTY_ACCESS_TOKEN - re-auth needed" >> linkedin-post-log.md
            git add linkedin-post-log.md
            git commit -m 'LinkedIn: re-auth required'
            git push
            exit 0
          fi

          if [ "$ECODE" != "0" ]; then
            stamp=$(date -u '+%Y-%m-%d %H:%M')
            echo "$stamp | FAIL | publish error (see Actions run log)" >> linkedin-post-log.md
            git add linkedin-post-log.md
            git commit -m 'LinkedIn: publish failed'
            git push
            exit 1
          fi

          SHARE_URN=$(echo "$OUTPUT" | grep -oE 'urn:li:share:[0-9]+' | head -1)
          stamp=$(date -u '+%Y-%m-%d %H:%M')
          first80=$(head -c 80 linkedin-queue/next-caption.txt | tr '\n' ' ')
          echo "$stamp | $SHARE_URN | $first80" >> linkedin-post-log.md
          git add linkedin-post-log.md
          git commit -m 'LinkedIn post log update'
          git push

          echo ""
          echo "PUBLISHED: https://www.linkedin.com/feed/update/${SHARE_URN}/"

      - name: Trigger first-30-min engagement (after 25min)
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Sleeping 25min then dispatching linkedin-engage workflow..."
          sleep 1500
          gh api repos/${{ github.repository }}/dispatches \
            -f event_type=linkedin-engage \
            || echo "dispatch failed — cron fallback (every 30min) will pick it up"
