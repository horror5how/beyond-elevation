name: LinkedIn Scheduled Posts (5× Daily)

# 5 posts per day, evenly spread 08:00–18:00 BST (07:00–17:00 UTC)
on:
  schedule:
    - cron: '0 7 * * *'    # 08:00 BST
    - cron: '0 9 * * *'    # 10:00 BST
    - cron: '0 11 * * *'   # 12:00 BST
    - cron: '0 13 * * *'   # 14:00 BST
    - cron: '0 17 * * *'   # 18:00 BST
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'linkedin-queue/trigger'

permissions:
  contents: write

# Never run two posts at the same time — queue them
concurrency:
  group: linkedin-post
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          npm install
          npm install playwright@1.56.1
          npx playwright install --with-deps chromium

      - name: Generate and publish post
        env:
          LI_TOKEN: ${{ secrets.LI_TOKEN }}
          LI_URN: ${{ secrets.LI_URN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/li-auto-post.mjs

      - name: Commit log update
        if: always()
        run: |
          git config user.email 'agent@beyondelevation.com'
          git config user.name 'BE LinkedIn Agent'
          git pull --rebase origin main
          git add linkedin-post-log.md
          git diff --cached --quiet && exit 0
          git commit -m 'LinkedIn: scheduled post log'
          for i in 1 2 3 4; do
            git push origin main && break
            sleep $((i * 3))
            git pull --rebase origin main
          done
