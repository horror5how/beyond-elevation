name: LinkedIn Scheduled Posts (5× Daily)

# 5 posts per day, evenly spread 08:00–18:00 BST (07:00–17:00 UTC)
on:
  schedule:
    - cron: '0 7 * * *'    # 08:00 BST
    - cron: '0 9 * * *'    # 10:00 BST
    - cron: '0 11 * * *'   # 12:00 BST
    - cron: '0 13 * * *'   # 14:00 BST
    - cron: '0 17 * * *'   # 18:00 BST
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'linkedin-queue/trigger'

permissions:
  contents: write

# Never run two posts at the same time — queue them
concurrency:
  group: linkedin-post
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          npm install
          npm install playwright@1.56.1
          npx playwright install --with-deps chromium

      - name: Publish next pending post from queue
        env:
          LI_TOKEN: ${{ secrets.LI_TOKEN }}
          LI_URN: ${{ secrets.LI_URN }}
        run: node scripts/li-auto-post.mjs

      - name: Commit queue + log update
        if: always()
        run: |
          git config user.email 'agent@beyondelevation.com'
          git config user.name 'BE LinkedIn Agent'
          git add linkedin-post-log.md linkedin-queue/daily-posts.md linkedin-slugs-used.txt linkedin-queue/recent-image-hashes.json linkedin-pipeline-log.md || true
          git diff --cached --quiet && { echo 'nothing to commit'; exit 0; }
          git commit -m 'LinkedIn: published next queued post'
          for i in 1 2 3 4; do
            git push origin main && exit 0
            sleep $((i * 3))
            git pull --rebase origin main
          done
          echo 'push failed after retries'
          exit 1
