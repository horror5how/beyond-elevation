<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1080px;
    background: #f8f6f2;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    display: flex; flex-direction: column;
    align-items: center; justify-content: space-between;
    padding: 80px 72px 60px;
    position: relative; overflow: hidden;
  }
  body::before {
    content: ''; position: absolute; top: -200px; right: -200px;
    width: 700px; height: 700px;
    background: radial-gradient(ellipse at center, rgba(230,185,140,0.18) 0%, transparent 70%);
    pointer-events: none;
  }
  .eyebrow {
    font-size: 12px; font-weight: 700; letter-spacing: 0.16em;
    color: #d7b086; text-transform: uppercase; text-align: center;
  }
  .main {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    flex: 1; text-align: center;
  }
  .stat {
    font-size: 140px; font-weight: 800; line-height: 0.9;
    letter-spacing: -0.06em; color: #1a1a1a;
  }
  .stat-label {
    font-size: 18px; font-weight: 600; letter-spacing: 0.08em;
    color: #4a4a4a; text-transform: uppercase; margin-top: 16px;
  }
  .divider {
    width: 64px; height: 2px; background: #d7b086;
    margin: 36px auto;
  }
  .description {
    font-size: 26px; font-weight: 300; line-height: 1.45;
    color: #2a2a2a; max-width: 800px; letter-spacing: -0.01em;
  }
  .note {
    font-size: 15px; font-weight: 600; color: #4a4a4a;
    letter-spacing: 0.06em; text-transform: uppercase;
    margin-top: 24px;
  }
  .footer {
    width: 100%; border-top: 1px solid #c8c4bc;
    padding-top: 22px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .be-wordmark { font-size: 28px; font-weight: 800; letter-spacing: -0.04em; color: #1a1a1a; }
  .footer-right { font-size: 11px; font-weight: 600; letter-spacing: 0.10em; color: #4a4a4a; text-transform: uppercase; }
</style>
</head>
<body>
  <div class="eyebrow">The Numbers Don't Lie</div>
  <div class="main">
    <div class="stat">20–30%</div>
    <div class="stat-label">of Fortune 500 leadership roles</div>
    <div class="divider"></div>
    <div class="description">are now filled by fractional, contract, or project-based senior talent. Not because companies went cheap. Because it works better.</div>
    <div class="note">Not freelancers. Senior operators. Hired for outcomes, not hours.</div>
  </div>
  <div class="footer">
    <div class="be-wordmark">BE</div>
    <div class="footer-right">@itshayatamin</div>
  </div>
</body>
</html>
