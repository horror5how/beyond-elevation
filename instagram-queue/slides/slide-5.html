  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1080px;
    background: #f8f6f2;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    display: flex; flex-direction: column;
    align-items: flex-start; justify-content: space-between;
    padding: 80px 80px 60px;
    position: relative; overflow: hidden;
  }
  body::before {
    content: ''; position: absolute; bottom: -180px; right: -180px;
    width: 600px; height: 600px;
    background: radial-gradient(ellipse at center, rgba(230,185,140,0.12) 0%, transparent 70%);
    pointer-events: none;
  }
  .number {
    font-size: 200px; font-weight: 800; color: #f0ede8;
    line-height: 1; letter-spacing: -0.06em;
    position: absolute; top: 32px; right: 52px; z-index: 0;
  }
  .content {
    position: relative; z-index: 1;
    display: flex; flex-direction: column;
    justify-content: space-between;
    height: 100%;
  }
  .top { flex: 1; display: flex; flex-direction: column; justify-content: center; padding-top: 60px; }
  .label {
    font-size: 11px; font-weight: 700; letter-spacing: 0.18em;
    color: #d7b086; text-transform: uppercase; margin-bottom: 20px;
  }
  .skill {
    font-size: 58px; font-weight: 700; line-height: 1.05;
    letter-spacing: -0.03em; color: #1a1a1a; margin-bottom: 32px;
    max-width: 760px;
  }
  .bar { width: 56px; height: 3px; background: #d7b086; margin-bottom: 32px; }
  .description {
    font-size: 26px; font-weight: 300; line-height: 1.45;
    color: #2a2a2a; max-width: 720px; letter-spacing: -0.01em;
  }
  .contrast {
    font-size: 15px; font-weight: 600; color: #4a4a4a;
    letter-spacing: 0.06em; text-transform: uppercase;
    margin-top: 28px;
  }
  .footer {
    width: 100%; border-top: 1px solid #c8c4bc;
    padding-top: 20px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .be-wordmark { font-size: 26px; font-weight: 800; letter-spacing: -0.04em; color: #1a1a1a; }
  .footer-right { font-size: 11px; font-weight: 600; letter-spacing: 0.10em; color: #4a4a4a; text-transform: uppercase; }
</style>
